{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="auth-container">

    <h1>Регистрация</h1>

    <form method="POST" class="auth-form">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Зарегистрироваться
        </button>
    </form>

    <p>
        Уже есть аккаунт?
        <a href="/accounts/login/">
            Войти
        </a>
    </p>

</div>

</body>
</html>
